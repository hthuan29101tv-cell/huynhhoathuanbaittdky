<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Đăng Ký</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 650px;
            border-radius: 20px; /* Bo góc lớn cho khung ngoài giống hình */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* Phần header màu xanh lá */
        .form-header {
            background-color: #8cb85c; /* Màu xanh lá chuẩn theo hình */
            color: #000000;
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .form-body {
            padding: 30px 40px;
        }

        /* Cấu trúc hàng gồm nhãn bên trái và ô nhập bên phải */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Định dạng cho nhãn tiêu đề (Họ tên, Ngày sinh,...) */
        .form-group label {
            width: 140px;
            font-size: 16px;
            font-weight: bold;
            color: #000000;
            flex-shrink: 0;
        }

        /* Định dạng các ô nhập liệu dạng text, date, email... */
        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group input[type="email"],
        .form-group select {
            flex-grow: 1;
            padding: 8px 0;
            border: none;
            border-bottom: 1px solid #000000; /* Đường gạch chân màu đen thay vì ô vuông */
            font-size: 15px;
            outline: none;
            background: transparent;
        }

        /* Khi click vào ô nhập liệu */
        .form-group input:focus,
        .form-group select:focus {
            border-bottom-width: 2px;
        }

        /* Tùy chỉnh riêng cho ô chọn file */
        .form-group input[type="file"] {
            flex-grow: 1;
            font-size: 15px;
        }

        /* Khối chọn Radio (Giới tính) và Checkbox (Sở trường) */
        .radio-group, .checkbox-group {
            display: flex;
            gap: 20px;
            flex-grow: 1;
            font-size: 15px;
        }

        .radio-group label, .checkbox-group label {
            display: flex;
            align-items: center;
            width: auto;
            font-weight: normal;
            cursor: pointer;
        }

        .radio-group input, .checkbox-group input {
            margin-right: 6px;
        }

        /* Định dạng khu vực Mô tả sơ lược (Textarea chiếm dòng riêng) */
        .textarea-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }

        .textarea-group label {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .textarea-group textarea {
            width: 100%;
            height: 120px;
            border: 1px solid #000000; /* Ô vuông viền đen theo mẫu */
            padding: 10px;
            font-size: 15px;
            outline: none;
            resize: none;
        }

        /* Khu vực chứa 2 nút bấm ở cuối */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid #000000;
            border-radius: 4px;
            cursor: pointer;
            background-color: #8cb85c; /* Màu xanh lá cho nút bấm */
            color: #000000;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            Thông tin đăng ký
        </div>

        <form class="form-body" onsubmit="event.preventDefault();">
            
            <div class="form-group">
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" placeholder="Nhập họ tên">
            </div>

            <div class="form-group">
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob">
            </div>

            <div class="form-group">
                <label>Giới tính:</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="Nam"> Nam</label>
                    <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Địa chỉ:</label>
                <input type="text" id="address" placeholder="Nhập địa chỉ">
            </div>

            <div class="form-group">
                <label for="student-id">MSSV:</label>
                <input type="text" id="student-id" placeholder="Nhập mã số sinh viên">
            </div>

            <div class="form-group">
                <label for="class-select">Lớp:</label>
                <select id="class-select">
                    <option value="DA25TTC">DA25TTC</option>
                    <option value="DA24TTC">DA24TTC</option>
                    <option value="DA23TTC">DA23TTC</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="text" id="phone" placeholder="Nhập số điện thoại">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Nhập email">
            </div>

            <div class="form-group">
                <label for="avatar">Ảnh đại diện:</label>
                <input type="file" id="avatar">
            </div>

            <div class="form-group">
                <label>Sở trường:</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" value="design"> Thiết kế web</label>
                    <label><input type="checkbox" value="code"> Lập trình web</label>
                    <label><input type="checkbox" value="chinese"> Thành thạo tiếng Trung</label>
                </div>
            </div>

            <div class="textarea-group">
                <label for="description">Mô tả sơ lược:</label>
                <textarea id="description"></textarea>
            </div>

            <div class="button-group">
                <button type="button" class="btn">Hủy bỏ</button>
                <button type="submit" class="btn">Đăng ký</button>
            </div>

        </form>
    </div>

</body>
</html>
